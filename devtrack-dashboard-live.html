<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DevTrack — Engineering Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f4f4f8;--text2:#a8a8c0;--text3:#606078;
  --accent:#7c6cf0;--accent2:#a29bfe;--accent3:#f472b6;
  --ok:#34d399;--warn:#fbbf24;--err:#f87171;--info:#60a5fa;
  --ff:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;--fh:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(124,108,240,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(244,114,182,0.06) 0%,transparent 50%),var(--bg)}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:40px;width:380px;position:relative;z-index:1}
.login-logo{font-family:var(--fh);font-size:28px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.login-sub{font-size:11px;font-family:var(--fm);color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.login-label{font-size:12px;font-family:var(--fm);color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border .15s;margin-bottom:16px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px}
.login-btn:hover{background:#8f82f2;transform:translateY(-1px)}.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;color:var(--err);font-size:12px;margin-bottom:12px;display:none}
.login-error.show{display:block}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:16px;font-family:var(--fm)}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--border)}
.logo-t{font-family:var(--fh);font-size:18px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-s{font-size:9px;font-family:var(--fm);color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.snav{padding:14px 10px 6px}
.slabel{font-size:10px;font-family:var(--fm);letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:400;transition:all .15s;user-select:none;position:relative}
.ni:hover{background:var(--bg3);color:var(--text)}.ni.on{background:rgba(124,108,240,0.15);color:var(--accent2);font-weight:500}
.ni.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nbadge{margin-left:auto;background:var(--err);color:#fff;font-size:9px;font-family:var(--fm);padding:1px 6px;border-radius:99px}.nbadge.p{background:var(--accent)}.nbadge.warn{background:var(--warn);color:#000}
.eng-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--fh);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ok);margin-left:auto;flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;flex-shrink:0}
.tbtitle{font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:-.4px}
.tbsub{font-size:11px;color:var(--text3);font-family:var(--fm)}
.srch{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:var(--ff);font-size:14px;width:200px;outline:none;transition:border .15s}
.srch:focus{border-color:var(--accent)}.srch::placeholder{color:var(--text3)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:var(--ff);font-size:14px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#8f82f2}
.btn-g{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:var(--bg4);color:var(--text)}
.btn-ok{background:rgba(52,211,153,0.15);color:var(--ok);border:1px solid rgba(52,211,153,0.3)}.btn-ok:hover{background:rgba(52,211,153,0.25)}
.btn-err{background:rgba(248,113,113,0.12);color:var(--err);border:1px solid rgba(248,113,113,0.25)}.btn-err:hover{background:rgba(248,113,113,0.22)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.content{padding:20px 24px;flex:1}
/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:border .2s}
.scard:hover{border-color:var(--border2)}
.scard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.sc-q::after{background:var(--warn)}.sc-b::after{background:var(--err)}.sc-p::after{background:var(--accent)}.sc-r::after{background:var(--ok)}
.slbl{font-size:11px;font-family:var(--fm);letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.snum{font-family:var(--fh);font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:6px}
.snum.q{color:var(--warn)}.snum.b{color:var(--err)}.snum.p{color:var(--accent2)}.snum.r{color:var(--ok)}
.sdelta{font-size:12px;color:var(--text3);font-family:var(--fm)}
/* FILTERS */
.fbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ftabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.ftab{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;user-select:none;font-weight:500}
.ftab.on{background:var(--accent);color:#fff}.ftab:not(.on):hover{background:var(--bg3);color:var(--text)}
/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.rc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:all .2s;cursor:pointer}
.rc:hover{border-color:var(--border2);transform:translateY(-1px);background:var(--bg3)}
.ch{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.tbadge{padding:3px 9px;border-radius:5px;font-size:11px;font-family:var(--fm);font-weight:500;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.tbadge.bug{background:rgba(248,113,113,0.15);color:var(--err);border:1px solid rgba(248,113,113,0.25)}
.tbadge.crash{background:rgba(244,114,182,0.15);color:var(--accent3);border:1px solid rgba(244,114,182,0.25)}
.tbadge.suggestion{background:rgba(124,108,240,0.15);color:var(--accent2);border:1px solid rgba(124,108,240,0.25)}
.pdot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.pdot.critical{background:var(--err);box-shadow:0 0 5px var(--err)}.pdot.high{background:var(--warn)}.pdot.medium{background:var(--info)}.pdot.low{background:var(--text3)}
.ctitle{font-family:var(--fh);font-size:15px;font-weight:600;line-height:1.4;margin-bottom:6px}
.cdesc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cf{display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.schip{padding:3px 8px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:500;text-transform:uppercase}
.schip.queued{background:rgba(251,191,36,0.12);color:var(--warn)}
.schip.open{background:rgba(248,113,113,0.12);color:var(--err)}
.schip.in_progress{background:rgba(96,165,250,0.12);color:var(--info)}
.schip.reviewing{background:rgba(124,108,240,0.12);color:var(--accent2)}
.schip.resolved{background:rgba(52,211,153,0.12);color:var(--ok)}
.tag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--fm);background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
/* KANBAN */
.kboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kcol{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.kch{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;font-size:12px;font-family:var(--fm);font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.kcdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kitems{padding:7px;min-height:60px}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:all .15s;font-size:13px;line-height:1.5}
.kcard:hover{border-color:var(--border2);background:var(--bg4)}
/* TASKS */
.tboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tpanel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tph{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.tptitle{font-family:var(--fh);font-size:14px;font-weight:700}
.tlist{padding:6px}
.titem{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .15s}
.titem:hover{background:var(--bg3)}
.tck{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:8px;font-weight:700}
.tck.done{background:var(--ok);border-color:var(--ok);color:#fff}
.ttxt{font-size:13px;color:var(--text2);flex:1;line-height:1.5}.ttxt.done{text-decoration:line-through;color:var(--text3)}
.ttag{font-size:11px;font-family:var(--fm);padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:2px}
.tadd{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px}
.tinput{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:var(--ff);font-size:13px;outline:none}
.tinput:focus{border-color:var(--accent)}.tinput::placeholder{color:var(--text3)}
.pbar{flex:1;height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.pbfill{height:100%;border-radius:99px;transition:width .3s}
.ucard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border .2s}
.ucard:hover{border-color:var(--border2)}
/* QUEUE */
.queue-list{display:flex;flex-direction:column;gap:0}
.queue-item{background:var(--bg2);border:1px solid var(--border);border-radius:0;padding:14px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .15s;border-bottom:none}
.queue-item:first-child{border-radius:12px 12px 0 0}
.queue-item:last-child{border-radius:0 0 12px 12px;border-bottom:1px solid var(--border)}
.queue-item:only-child{border-radius:12px;border-bottom:1px solid var(--border)}
.queue-item:hover{background:var(--bg3);border-color:var(--border2)}
.queue-item.active{background:var(--bg3);border-color:var(--accent);border-bottom:1px solid var(--accent)}
.queue-num{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--text3);min-width:36px;text-align:right;padding-top:2px}
.queue-body{flex:1;min-width:0}
.queue-title{font-family:var(--fh);font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.3}
.queue-meta{font-size:12px;color:var(--text3);font-family:var(--fm);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.queue-actions{display:flex;gap:6px;flex-shrink:0}
/* REVIEW PANEL */
.review-layout{display:grid;grid-template-columns:1fr 400px;gap:16px;align-items:start;height:calc(100vh - 120px)}
.review-left{overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.review-right{overflow-y:auto;display:flex;flex-direction:column;gap:12px;position:sticky;top:0;max-height:calc(100vh - 140px)}
.rbox{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.rbox-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rbox-title span{font-size:12px;color:var(--text3);font-weight:400;font-family:var(--fm)}
/* MEDIA */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.media-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.media-card img{width:100%;display:block;cursor:pointer;transition:opacity .15s}
.media-card img:hover{opacity:.85}
.media-card video{width:100%;display:block;max-height:200px}
.media-label{padding:6px 10px;font-size:9px;color:var(--text3);font-family:var(--fm);border-top:1px solid var(--border)}
/* DUPLICATE */
.dup-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border .15s}
.dup-item:hover{border-color:var(--accent2)}
.dup-match{font-size:11px;font-family:var(--fm);color:var(--accent2);margin-bottom:5px}
.dup-title{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3}
.dup-meta{font-size:12px;color:var(--text3);font-family:var(--fm)}
.no-dups{font-size:13px;color:var(--text3);font-family:var(--fm);padding:14px 0;text-align:center}
/* ACCEPT FORM */
.afield{margin-bottom:12px}
.albl{font-size:11px;font-family:var(--fm);letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:block}
.ainput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border .15s}
.ainput:focus{border-color:var(--accent)}.ainput::placeholder{color:var(--text3)}
.atextarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border .15s;resize:vertical;min-height:90px}
.atextarea:focus{border-color:var(--accent)}.atextarea::placeholder{color:var(--text3)}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.level-btn{padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;font-family:var(--ff);transition:all .15s}
.level-btn:hover{border-color:var(--border2);color:var(--text)}
.level-btn.sel.minor{border-color:var(--ok);background:rgba(52,211,153,0.1);color:var(--ok)}
.level-btn.sel.moderate{border-color:var(--warn);background:rgba(251,191,36,0.1);color:var(--warn)}
.level-btn.sel.major{border-color:var(--err);background:rgba(248,113,113,0.1);color:var(--err)}
.level-label{font-size:14px;font-weight:600;display:block;margin-bottom:3px}
.level-sub{font-size:11px;font-family:var(--fm);opacity:.75}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:26px;width:600px;max-width:100%;max-height:88vh;overflow-y:auto}
.mth{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
.mttl{font-family:var(--fh);font-size:19px;font-weight:700;line-height:1.3}
.mclose{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;transition:all .15s}
.mclose:hover{background:var(--bg4);color:var(--text)}
.mlbl{font-size:11px;font-family:var(--fm);letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:block}
.mval{font-size:14px;color:var(--text2);line-height:1.7;background:var(--bg3);border-radius:8px;padding:13px 15px;border:1px solid var(--border);margin-bottom:14px}
.msel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none}
.msel:focus{border-color:var(--accent)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:12px;color:var(--text);z-index:200;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;pointer-events:none}
.toast.ok{border-color:rgba(52,211,153,0.4)}.toast.err{border-color:rgba(248,113,113,0.4)}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-family:var(--fm);font-size:14px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--text3);font-family:var(--fm);font-size:14px}
.uprof{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border .15s;user-select:none;position:relative}
.uprof:hover{border-color:var(--border2)}
.disc-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(88,101,242,0.12);border:1px solid rgba(88,101,242,0.25);border-radius:4px;padding:2px 8px;font-size:11px;color:#818cf8;font-family:var(--fm)}
/* ADMIN */
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--fh);font-size:16px;font-weight:700}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .15s}
.user-row:last-child{border-bottom:none}.user-row:hover{background:var(--bg3)}
.role-chip{padding:3px 9px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:500;text-transform:uppercase}
.role-chip.admin{background:rgba(124,108,240,0.15);color:var(--accent2);border:1px solid rgba(124,108,240,0.25)}
.role-chip.engineer{background:rgba(52,211,153,0.1);color:var(--ok);border:1px solid rgba(52,211,153,0.2)}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;transition:border .15s;margin-top:4px}
.fi:focus{border-color:var(--accent)}.fi::placeholder{color:var(--text3)}
.fl{font-size:11px;font-family:var(--fm);letter-spacing:1px;text-transform:uppercase;color:var(--text3);display:block;margin-top:10px}
.fsel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--ff);font-size:14px;outline:none;margin-top:4px}
.dbtn{background:rgba(248,113,113,0.1);color:var(--err);border:1px solid rgba(248,113,113,0.2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--ff);transition:all .15s}
.dbtn:hover{background:rgba(248,113,113,0.2)}
.ebtn{background:var(--bg4);color:var(--text2);border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--ff);transition:all .15s}
.ebtn:hover{background:var(--bg3);color:var(--text)}
.side-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.side-title{font-family:var(--fh);font-size:16px;font-weight:700;margin-bottom:6px}
.side-sub{font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.6}
.ferr{font-size:13px;color:var(--err);margin-top:6px;min-height:18px}
.admin-badge{background:rgba(124,108,240,0.15);color:var(--accent2);border:1px solid rgba(124,108,240,0.25);border-radius:4px;padding:2px 8px;font-size:11px;font-family:var(--fm);text-transform:uppercase}
.buglevel-chip{padding:3px 9px;border-radius:4px;font-size:11px;font-family:var(--fm);font-weight:500;text-transform:uppercase}
/* LEADERBOARD */
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lb-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.lb-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.lb-title{font-family:var(--fh);font-size:15px;font-weight:700}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--bg3)}
.lb-rank{font-family:var(--fh);font-size:18px;font-weight:800;min-width:32px;text-align:center}
.lb-rank.gold{color:#fbbf24}.lb-rank.silver{color:#94a3b8}.lb-rank.bronze{color:#b45309}
.lb-name{flex:1;font-size:14px;font-weight:500}
.lb-sub{font-size:11px;color:var(--text3);font-family:var(--fm)}
.lb-count{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--accent2)}
.lb-bar{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:4px}
.lb-barfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.lb-empty{padding:32px;text-align:center;color:var(--text3);font-family:var(--fm);font-size:13px}
.lb-stat{background:var(--bg3);border-radius:8px;padding:10px 14px;text-align:center}
.lb-stat-num{font-family:var(--fh);font-size:24px;font-weight:800}
.lb-stat-lbl{font-size:10px;color:var(--text3);font-family:var(--fm);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* CONVERSATION */
.conv-tab{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.conv-tab-btn{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;user-select:none;font-weight:500}
.conv-tab-btn.on{color:var(--accent2);border-bottom-color:var(--accent)}
.conv-tab-btn:hover:not(.on){color:var(--text2)}
.conv-messages{display:flex;flex-direction:column;gap:12px;max-height:340px;overflow-y:auto;padding-right:4px}
.conv-msg{display:flex;gap:10px;align-items:flex-start}
.conv-msg.bot-msg{opacity:.7}
.conv-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg4);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fh);overflow:hidden}
.conv-avatar img{width:100%;height:100%;object-fit:cover}
.conv-body{flex:1;min-width:0}
.conv-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.conv-name{font-size:13px;font-weight:600;color:var(--text)}
.conv-time{font-size:10px;color:var(--text3);font-family:var(--fm)}
.conv-content{font-size:13px;color:var(--text2);line-height:1.6;word-break:break-word}
.conv-attachments{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.conv-attachment{font-size:10px;color:var(--info);font-family:var(--fm);background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);border-radius:4px;padding:2px 7px;text-decoration:none}
.conv-attachment:hover{background:rgba(96,165,250,0.2)}
.conv-empty{text-align:center;padding:32px;color:var(--text3);font-size:12px;font-family:var(--fm)}
.conv-loading{text-align:center;padding:20px;color:var(--text3);font-size:12px;font-family:var(--fm)}

/* DELETE MODAL */
.delete-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px;width:480px;max-width:100%}
.delete-modal-title{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px}
.delete-modal-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.delete-report-title{font-size:13px;color:var(--text3);font-family:var(--fm);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:18px;line-height:1.5}

.buglevel-chip.minor{background:rgba(52,211,153,0.12);color:var(--ok);border:1px solid rgba(52,211,153,0.25)}
.buglevel-chip.moderate{background:rgba(251,191,36,0.12);color:var(--warn);border:1px solid rgba(251,191,36,0.25)}
.buglevel-chip.major{background:rgba(248,113,113,0.12);color:var(--err);border:1px solid rgba(248,113,113,0.25)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API='https://devtrack-backend-production.up.railway.app';
let TOKEN=localStorage.getItem('devtrack_token');
let CURRENT_USER=JSON.parse(localStorage.getItem('devtrack_user')||'null');

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json',Authorization:`Bearer ${TOKEN}`}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  if(res.status===401){logout();return null;}
  if(!res.ok)throw new Error((await res.json()).error||'Request failed');
  return res.json();
}
const getReports=()=>api('GET','/api/reports');
const getUsers=()=>api('GET','/api/users');
const getTasks=()=>api('GET','/api/tasks');
const patchReport=(id,data)=>api('PATCH',`/api/reports/${id}`,data);
const acceptReport=(id,data)=>api('POST',`/api/reports/${id}/accept`,data);
const deleteReport=(id)=>api('DELETE',`/api/reports/${id}`);
const getSimilar=(title,excludeId)=>api('GET',`/api/reports/similar?title=${encodeURIComponent(title)}&excludeId=${excludeId||''}`);
const toggleTask=(id,done)=>api('PATCH',`/api/tasks/${id}`,{done});
const createTask=(text,userId)=>api('POST','/api/tasks',{text,userId,tag:'feature'});
const changePassword=(c,n)=>api('POST','/api/auth/change-password',{currentPassword:c,newPassword:n});
const getMessages=(reportId)=>api('GET',`/api/messages/${reportId}`);
const registerUser=(d)=>api('POST','/api/auth/register',d);
const updateUser=(id,d)=>api('PATCH',`/api/auth/users/${id}`,d);
const deleteUser=(id)=>api('DELETE',`/api/auth/users/${id}`);

// ── State ─────────────────────────────────────────────────────────────────────
let state={nav:'queue',reports:[],users:[],tasks:[],filter:'all',search:'',modal:null,loading:true,newTaskInputs:{},editingUser:null,reviewId:null,similar:[],acceptForm:{bugLevel:'',assigneeId:'',devNotes:'',priority:'medium'},deleteModal:false,modalTab:'details',modalMessages:[],modalMessagesLoading:false};

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type='ok'){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=(type==='ok'?'✓ ':'✕ ')+msg;
  el.className=`toast ${type}`;el.style.display='flex';
  toastTimer=setTimeout(()=>{el.style.display='none';},2800);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll(){
  state.loading=true;render();
  try{
    const[reports,users,tasks]=await Promise.all([getReports(),getUsers(),getTasks()]);
    state.reports=reports||[];state.users=users||[];state.tasks=tasks||[];
    // If reviewing a report that no longer exists, clear it
    if(state.reviewId&&!state.reports.find(r=>r.id===state.reviewId))state.reviewId=null;
  }catch(e){showToast('Failed to load — is the backend running?','err');}
  state.loading=false;render();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login(email,password){
  const res=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  if(!res.ok)throw new Error((await res.json()).error||'Login failed');
  const data=await res.json();
  TOKEN=data.token;CURRENT_USER=data.user;
  localStorage.setItem('devtrack_token',TOKEN);localStorage.setItem('devtrack_user',JSON.stringify(CURRENT_USER));
}
function logout(){
  TOKEN=null;CURRENT_USER=null;
  localStorage.removeItem('devtrack_token');localStorage.removeItem('devtrack_user');
  state={nav:'queue',reports:[],users:[],tasks:[],filter:'all',search:'',modal:null,loading:true,newTaskInputs:{},editingUser:null,reviewId:null,similar:[],acceptForm:{bugLevel:'',assigneeId:'',devNotes:'',priority:'medium'},deleteModal:false,modalTab:'details',modalMessages:[],modalMessagesLoading:false};
  renderLogin();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const ENG_COLORS=['#7c6cf0','#34d399','#f472b6','#fbbf24','#60a5fa','#fb923c','#a78bfa'];
function userColor(u,idx){return ENG_COLORS[(idx||0)%ENG_COLORS.length];}
function initials(name){if(!name)return'??';return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function avHtml(user,size,idx){
  const col=userColor(user,idx||0);
  return`<div class="av" style="width:${size}px;height:${size}px;background:${col}22;color:${col};border:1.5px solid ${col}44;font-size:${Math.floor(size*.38)}px">${initials(user?.name||'?')}</div>`;
}
function statusLabel(s){return{queued:'Queued',open:'Open',in_progress:'In Progress',reviewing:'Reviewing',resolved:'Resolved'}[s]||s;}
function timeAgo(d){const diff=Date.now()-new Date(d).getTime(),m=Math.floor(diff/60000);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const TAGC={bug:'rgba(248,113,113,0.15)|#f87171',feature:'rgba(124,108,240,0.15)|#a29bfe',review:'rgba(96,165,250,0.15)|#60a5fa',docs:'rgba(52,211,153,0.15)|#34d399',tests:'rgba(251,191,36,0.15)|#fbbf24',qa:'rgba(244,114,182,0.15)|#f472b6',ops:'rgba(96,165,250,0.15)|#60a5fa'};
function tagStyle(t){const tc=(TAGC[t]||'rgba(255,255,255,0.05)|var(--text3)').split('|');return`background:${tc[0]};color:${tc[1]}`;}

// ── Media renderer ────────────────────────────────────────────────────────────
function mediaHtml(attachments){
  if(!attachments||!attachments.length)return'';
  return`<div class="media-grid">${attachments.map(a=>{
    const url=a.url.startsWith('http')?a.url:API+a.url;
    if(a.type==='image')return`<div class="media-card"><img src="${url}" alt="${escHtml(a.filename)}" onclick="window.open('${url}','_blank')" onerror="this.style.display='none'"><div class="media-label">🖼 ${escHtml(a.filename)}</div></div>`;
    return`<div class="media-card"><video controls preload="metadata"><source src="${url}"></video><div class="media-label">🎬 ${escHtml(a.filename)}</div></div>`;
  }).join('')}</div>`;
}

// ── Queue page ────────────────────────────────────────────────────────────────
function queuePageHtml(){
  const queued=state.reports.filter(r=>r.queued).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  const reviewing=state.reviewId?state.reports.find(r=>r.id===state.reviewId):null;

  if(!queued.length&&!reviewing){
    return`<div style="text-align:center;padding:60px 20px">
      <div style="font-size:32px;margin-bottom:12px">✅</div>
      <div style="font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:6px">Queue is clear</div>
      <div style="font-size:12px;color:var(--text3)">No pending reports. New Discord posts will appear here automatically.</div>
      <button class="btn btn-g" onclick="loadAll()" style="margin-top:16px">↻ Refresh</button>
    </div>`;
  }

  const queueList=queued.length?`<div class="queue-list">
    ${queued.map((r,i)=>{
      const isActive=state.reviewId===r.id;
      return`<div class="queue-item${isActive?' active':''}" onclick="openReview('${r.id}')">
        <div class="queue-num">#${i+1}</div>
        <div class="queue-body">
          <div class="queue-title">${escHtml(r.title)}</div>
          <div class="queue-meta">
            <span class="tbadge ${r.type}" style="font-size:8px">${r.type}</span>
            <span>⬡ ${escHtml(r.discordUser)}</span>
            <span>${timeAgo(r.createdAt)}</span>
            ${(r.attachments||[]).length?`<span>📎 ${r.attachments.length}</span>`:''}
          </div>
        </div>
        <div class="queue-actions" onclick="event.stopPropagation()">
          <button class="btn btn-g" style="padding:6px 12px;font-size:13px" onclick="openReview('${r.id}')">Review</button>
          <button class="btn btn-err" style="padding:6px 12px;font-size:13px" onclick="doDelete('${r.id}','${escHtml(r.title)}')">Delete</button>
        </div>
      </div>`;
    }).join('')}
  </div>`:'';

  const reviewPanel=reviewing?reviewPanelHtml(reviewing):`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--text3);font-family:var(--fm);font-size:12px">← Select a report from the queue to review it</div>`;

  return`<div style="display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start;min-height:calc(100vh - 120px)">
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-family:var(--fh);font-size:14px;font-weight:700">Incoming Queue <span style="font-size:11px;color:var(--text3);font-weight:400">${queued.length} pending</span></span>
        <button class="btn btn-g" style="font-size:11px;padding:4px 10px" onclick="loadAll()">↻</button>
      </div>
      ${queueList||'<div style="text-align:center;padding:24px;color:var(--text3);font-size:11px;font-family:var(--fm);background:var(--bg2);border:1px solid var(--border);border-radius:12px">Queue is empty</div>'}
    </div>
    <div>${reviewPanel}</div>
  </div>`;
}

function reviewPanelHtml(r){
  const sim=state.similar;
  const af=state.acceptForm;

  const simHtml=sim.length?sim.map(s=>{
    const shared=r.title.toLowerCase().split(/\s+/).filter(w=>w.length>3&&s.title.toLowerCase().includes(w));
    const pct=Math.min(100,Math.round(shared.length/Math.max(r.title.split(' ').length,1)*100*2));
    return`<div class="dup-item" onclick="openModal('${s.id}')">
      <div class="dup-match">~${pct}% match · ${statusLabel(s.status)} · ${s.bugLevel?`<span class="buglevel-chip ${s.bugLevel}">${s.bugLevel}</span>`:''}</div>
      <div class="dup-title">${escHtml(s.title)}</div>
      <div class="dup-meta">${escHtml(s.discordUser)} · ${timeAgo(s.createdAt)} · ▲ ${s.upvotes}</div>
    </div>`;
  }).join(''):`<div class="no-dups">✓ No similar active reports found</div>`;

  const userOpts=state.users.map((u,i)=>`<option value="${u.id}" ${af.assigneeId===u.id?'selected':''}>${escHtml(u.name)}</option>`).join('');

  return`<div style="display:flex;flex-direction:column;gap:12px">
    <!-- Report detail -->
    <div class="rbox">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
        <span class="tbadge ${r.type}">${r.type}</span>
        <span class="disc-badge">⬡ ${escHtml(r.discordUser)} · ${escHtml(r.discordChannel)}</span>
        <span style="font-size:12px;color:var(--text3);font-family:var(--fm);margin-left:auto">${timeAgo(r.createdAt)}</span>
      </div>
      <div style="font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:12px;line-height:1.3">${escHtml(r.title)}</div>
      <div style="font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:${(r.attachments||[]).length?12:0}px">${escHtml(r.description)}</div>
      ${mediaHtml(r.attachments)}
      ${(r.tags||[]).length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
    </div>

    <!-- Duplicate check -->
    <div class="rbox">
      <div class="rbox-title">Duplicate Check <span>${sim.length} potential match${sim.length!==1?'es':''}</span></div>
      ${simHtml}
    </div>

    <!-- Accept form -->
    <div class="rbox">
      <div class="rbox-title">Accept Report</div>

      <div class="afield">
        <label class="albl">Bug Level *</label>
        <div class="level-grid">
          ${['minor','moderate','major'].map(l=>`<button class="level-btn${af.bugLevel===l?' sel '+l:''}" data-level="${l}" onclick="setAcceptField('bugLevel','${l}')">
            <span class="level-label">${l.charAt(0).toUpperCase()+l.slice(1)}</span>
            <span class="level-sub">${l==='minor'?'Low impact':l==='moderate'?'Noticeable':'Breaking'}</span>
          </button>`).join('')}
        </div>
      </div>

      <div class="afield">
        <label class="albl">Assign To (optional)</label>
        <select class="ainput" onchange="state.acceptForm.assigneeId=this.value">
          <option value="">Unassigned</option>
          ${userOpts}
        </select>
      </div>

      <div class="afield">
        <label class="albl">Dev Notes (optional)</label>
        <textarea class="atextarea" placeholder="Reproduction steps, initial thoughts, related issues..." id="accept-notes">${escHtml(af.devNotes)}</textarea>
      </div>

      <div style="display:flex;gap:8px">
        <button class="btn btn-ok" onclick="doAccept('${r.id}')" style="flex:1;justify-content:center">✓ Accept &amp; Move to Active</button>
        <button class="btn btn-err" onclick="doDelete('${r.id}','${escHtml(r.title)}')" style="justify-content:center">🗑 Delete</button>
      </div>
    </div>
  </div>`;
}

// ── Queue actions ─────────────────────────────────────────────────────────────
window.openReview=async(id)=>{
  state.reviewId=id;
  state.acceptForm={bugLevel:'',assigneeId:'',devNotes:'',priority:'medium'};
  render();
  const r=state.reports.find(r=>r.id===id);
  if(r){
    const desc=encodeURIComponent((r.description||'').slice(0,300));
    const sim=await api('GET',`/api/reports/similar?title=${encodeURIComponent(r.title)}&description=${desc}&excludeId=${id}`).catch(()=>[]);
    state.similar=sim||[];
    render();
  }
};

window.setAcceptField=(field,val)=>{
  state.acceptForm={...state.acceptForm,[field]:val};
  // Patch DOM directly instead of full re-render
  if(field==='bugLevel'){
    document.querySelectorAll('.level-btn').forEach(btn=>{
      const l=btn.dataset.level;
      btn.className='level-btn'+(val===l?' sel '+l:'');
    });
  }
  // No re-render needed - values read from state.acceptForm on submit
};

window.doAccept=async(id)=>{
  const af=state.acceptForm;
  if(!af.bugLevel){showToast('Please select a bug level','err');return;}
  const notesEl=document.getElementById('accept-notes');
  const devNotes=notesEl?notesEl.value.trim():af.devNotes||'';
  try{
    // Map bugLevel to priority automatically
    const priorityMap={minor:'low',moderate:'medium',major:'high'};
    const updated=await acceptReport(id,{
      bugLevel:af.bugLevel,
      priority:priorityMap[af.bugLevel]||'medium',
      assigneeIds:af.assigneeId?[af.assigneeId]:[],
      devNotes:devNotes||null
    });
    state.reports=state.reports.map(r=>r.id===id?updated:r);
    state.reviewId=null;state.similar=[];
    showToast('Report accepted and moved to active');render();
  }catch(e){showToast('Failed: '+e.message,'err');}
};

// Delete modal state
let deleteState={id:null,title:null};

window.doDelete=(id,title)=>{
  deleteState={id,title};
  state.deleteModal=true;
  render();
};

window.closeDeleteModal=()=>{
  deleteState={id:null,title:null};
  state.deleteModal=false;
  render();
};

window.confirmDelete=async()=>{
  const reason=document.getElementById('delete-reason')?.value.trim()||'';
  const{id}=deleteState;
  try{
    // Patch devNotes with reason before deleting so backend sends it to Discord
    if(reason){
      await patchReport(id,{devNotes:reason});
    }
    await deleteReport(id);
    state.reports=state.reports.filter(r=>r.id!==id);
    if(state.reviewId===id){state.reviewId=null;state.similar=[];}
    state.deleteModal=false;
    state.modal=null;
    deleteState={id:null,title:null};
    showToast('Report declined and removed');render();
  }catch(e){showToast('Delete failed: '+e.message,'err');}
};

function leaderboardHtml(){
  // Only count accepted (non-queued) bug/crash reports
  const accepted = state.reports.filter(r => !r.queued && (r.type === 'bug' || r.type === 'crash'));
  const suggestions = state.reports.filter(r => !r.queued && r.type === 'suggestion');

  // Tally by discordUser
  function tally(arr){
    const map = {};
    arr.forEach(r => {
      const key = r.discordUserId || r.discordUser;
      const name = r.discordUser || 'Unknown';
      if (!map[key]) map[key] = { name, count: 0, minor: 0, moderate: 0, major: 0 };
      map[key].count++;
      if (r.bugLevel) map[key][r.bugLevel] = (map[key][r.bugLevel] || 0) + 1;
    });
    return Object.values(map).sort((a,b) => b.count - a.count);
  }

  const bugReporters = tally(accepted);
  const suggReporters = tally(suggestions);
  const max = bugReporters[0]?.count || 1;
  const maxS = suggReporters[0]?.count || 1;

  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
  const rankIcon = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;

  function rowHtml(u, i, maxCount){
    const pct = Math.round(u.count / maxCount * 100);
    return`<div class="lb-row">
      <div class="lb-rank ${rankClass(i)}">${rankIcon(i)}</div>
      <div style="flex:1;min-width:0">
        <div class="lb-name">${escHtml(u.name)}</div>
        <div class="lb-sub">${u.minor?`${u.minor} minor `:''} ${u.moderate?`${u.moderate} moderate `:''} ${u.major?`${u.major} major`:''}</div>
        <div class="lb-bar"><div class="lb-barfill" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-count">${u.count}</div>
    </div>`;
  }

  // Overall stats
  const totalReports = state.reports.filter(r => !r.queued).length;
  const uniqueReporters = new Set(state.reports.filter(r=>!r.queued).map(r=>r.discordUserId||r.discordUser)).size;
  const thisWeek = state.reports.filter(r => !r.queued && (Date.now() - new Date(r.createdAt).getTime()) < 7*24*60*60*1000).length;

  return`<div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="lb-stat"><div class="lb-stat-num" style="color:var(--accent2)">${totalReports}</div><div class="lb-stat-lbl">Accepted Reports</div></div>
      <div class="lb-stat"><div class="lb-stat-num" style="color:var(--ok)">${uniqueReporters}</div><div class="lb-stat-lbl">Unique Reporters</div></div>
      <div class="lb-stat"><div class="lb-stat-num" style="color:var(--warn)">${thisWeek}</div><div class="lb-stat-lbl">This Week</div></div>
    </div>
    <div class="lb-grid">
      <div class="lb-card">
        <div class="lb-head"><span style="font-size:18px">🐛</span><span class="lb-title">Bug Reporters</span><span style="margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--fm)">${accepted.length} accepted</span></div>
        ${bugReporters.length ? bugReporters.slice(0,10).map((u,i)=>rowHtml(u,i,max)).join('') : '<div class="lb-empty">No accepted bug reports yet</div>'}
      </div>
      <div class="lb-card">
        <div class="lb-head"><span style="font-size:18px">💡</span><span class="lb-title">Suggestion Contributors</span><span style="margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--fm)">${suggestions.length} accepted</span></div>
        ${suggReporters.length ? suggReporters.slice(0,10).map((u,i)=>rowHtml(u,i,maxS)).join('') : '<div class="lb-empty">No accepted suggestions yet</div>'}
      </div>
    </div>
  </div>`;
}

  const{nav,reports,users,tasks,filter,search,modal,loading}=state;

  const activeReports=reports.filter(r=>!r.queued);

  const filtered=activeReports.filter(r=>{
    const mf=filter==='all'||r.type===filter||r.status===filter||r.bugLevel===filter;
    const ms=!search||r.title.toLowerCase().includes(search.toLowerCase())||(r.description||'').toLowerCase().includes(search.toLowerCase());
    return mf&&ms;
  });
  const shown=nav==='bugs'?filtered.filter(r=>r.type==='bug'||r.type==='crash'):nav==='suggestions'?filtered.filter(r=>r.type==='suggestion'):filtered;

  const bugs=activeReports.filter(r=>r.type==='bug'||r.type==='crash').length;
  const sugg=activeReports.filter(r=>r.type==='suggestion').length;
  const inp=activeReports.filter(r=>r.status==='in_progress').length;
  const res=activeReports.filter(r=>r.status==='resolved').length;
  const curIdx=users.findIndex(u=>u.id===CURRENT_USER.id);

  const navItems=[
    {k:'queue',ic:'⬤',lbl:'Bug Queue',badge:queuedCount,bc:'warn'},
    {k:'overview',ic:'◈',lbl:'Overview'},
    {k:'bugs',ic:'⬡',lbl:'Bug Reports',badge:activeReports.filter(r=>(r.type==='bug'||r.type==='crash')&&r.status!=='resolved').length||null,bc:''},
    {k:'suggestions',ic:'◇',lbl:'Suggestions',badge:sugg,bc:'p'},
    {k:'kanban',ic:'▦',lbl:'Kanban'},
    {k:'tasks',ic:'☑',lbl:'Task Board'},
    {k:'team',ic:'◉',lbl:'Team'},
    {k:'admin',ic:'⚙',lbl:CURRENT_USER.role==='admin'?'Admin':'My Account'},
    {k:'leaderboard',ic:'🏆',lbl:'Leaderboard'},
  ];
  const navHtml=navItems.map(n=>`<div class="ni${nav===n.k?' on':''}" onclick="setNav('${n.k}')">${n.ic} ${n.lbl}${n.badge?`<span class="nbadge ${n.bc||''}">${n.badge}</span>`:''}</div>`).join('');
  const engHtml=users.slice(0,8).map((u,i)=>`<div class="eng-row">${avHtml(u,24,i)}<div><div style="font-size:13px;color:var(--text);font-weight:500">${escHtml(u.name)}</div><div style="font-size:11px;color:var(--text3)">${escHtml(u.role)}</div></div><div class="dot"></div></div>`).join('');
  const titles={queue:'Bug Queue',overview:'Overview',bugs:'Bug Reports',suggestions:'Suggestions',kanban:'Kanban Board',tasks:'Task Board',team:'Team',admin:CURRENT_USER.role==='admin'?'Admin Panel':'My Account',leaderboard:'Reporter Leaderboard'};

  let content='';
  if(loading){content=`<div class="loading"><div class="spinner"></div>Loading from database...</div>`;}
  else if(nav==='queue'){content=queuePageHtml();}
  else if(nav==='overview'||nav==='bugs'||nav==='suggestions'){
    const statsHtml=nav==='overview'?`<div class="sgrid">
      <div class="scard sc-q"><div class="slbl">In Queue</div><div class="snum q">${queuedCount}</div><div class="sdelta">pending review</div></div>
      <div class="scard sc-b"><div class="slbl">Active Bugs</div><div class="snum b">${bugs}</div><div class="sdelta">accepted reports</div></div>
      <div class="scard sc-p"><div class="slbl">Suggestions</div><div class="snum p">${sugg}</div><div class="sdelta">from community</div></div>
      <div class="scard sc-r"><div class="slbl">Resolved</div><div class="snum r">${res}</div><div class="sdelta">closed out</div></div>
    </div>`:'';
    const filterTabs=['all','bug','crash','suggestion','minor','moderate','major','open','in_progress','resolved'].map(f=>`<div class="ftab${filter===f?' on':''}" onclick="setFilter('${f}')">${f==='in_progress'?'In Progress':f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</div>`).join('');
    content=`${statsHtml}<div class="fbar"><div class="ftabs">${filterTabs}</div><button class="btn btn-g" onclick="loadAll()" style="margin-left:auto">↻ Refresh</button></div><div class="cgrid">${shown.length?shown.map(reportCard).join(''):'<div class="empty">No reports match your filter</div>'}</div>`;
  }
  else if(nav==='kanban'){
    const cols=[{k:'open',lbl:'Open',c:'var(--err)'},{k:'in_progress',lbl:'In Progress',c:'var(--warn)'},{k:'reviewing',lbl:'Reviewing',c:'var(--info)'},{k:'resolved',lbl:'Resolved',c:'var(--ok)'}];
    content=`<div class="kboard">${cols.map(col=>{
      const reps=activeReports.filter(r=>r.status===col.k);
      return`<div class="kcol"><div class="kch"><div class="kcdot" style="background:${col.c}"></div>${col.lbl}<span style="margin-left:auto;font-size:9px;color:var(--text3)">${reps.length}</span></div><div class="kitems">${reps.map(r=>`<div class="kcard" onclick="openModal('${r.id}')"><div style="display:flex;gap:5px;margin-bottom:5px"><span class="tbadge ${r.type}" style="font-size:8px">${r.type}</span>${r.bugLevel?`<span class="buglevel-chip ${r.bugLevel}" style="font-size:8px">${r.bugLevel}</span>`:''}</div><div>${escHtml(r.title)}</div><div style="font-size:9px;color:var(--text3);margin-top:4px">${timeAgo(r.createdAt)}</div></div>`).join('')||'<div style="padding:10px;color:var(--text3);font-size:10px;font-family:var(--fm);text-align:center">Empty</div>'}</div></div>`;
    }).join('')}</div>`;
  }
  else if(nav==='tasks'){
    const totalDone=tasks.filter(t=>t.done).length;
    const panels=users.map((u,ui)=>{
      const ut=tasks.filter(t=>t.userId===u.id);
      const done=ut.filter(t=>t.done).length;
      const pct=ut.length?Math.round(done/ut.length*100):0;
      const col=userColor(u,ui);
      return`<div class="tpanel">
        <div class="tph">${avHtml(u,22,ui)}<span class="tptitle">${escHtml(u.name.split(' ')[0])}</span><span style="font-size:9px;color:var(--text3);font-family:var(--fm);margin-left:auto">${done}/${ut.length}</span><div class="pbar" style="max-width:40px"><div class="pbfill" style="width:${pct}%;background:${col}"></div></div></div>
        <div class="tlist">${ut.map(t=>`<div class="titem" onclick="doToggleTask('${t.id}',${!t.done})"><div class="tck${t.done?' done':''}">${t.done?'✓':''}</div><span class="ttxt${t.done?' done':''}">${escHtml(t.text)}</span><span class="ttag" style="${tagStyle(t.tag)}">${t.tag}</span></div>`).join('')||'<div style="padding:10px;color:var(--text3);font-size:10px;font-family:var(--fm)">No tasks yet</div>'}</div>
        <div class="tadd"><input class="tinput" placeholder="Add task..." id="ti_${u.id}" onkeydown="if(event.key==='Enter')doAddTask('${u.id}')" onkeyup="state.newTaskInputs['${u.id}']=this.value" onchange="state.newTaskInputs['${u.id}']=this.value"><button class="btn btn-p" onclick="doAddTask('${u.id}')" style="padding:4px 9px;font-size:11px">+</button></div>
      </div>`;
    }).join('');
    content=`<div style="margin-bottom:16px;display:flex;align-items:center;gap:10px"><span style="font-family:var(--fh);font-size:15px;font-weight:700">Task Boards</span><span style="font-size:10px;color:var(--text3);font-family:var(--fm)">${totalDone}/${tasks.length} complete</span></div><div class="tboard">${panels}</div>`;
  }
  else if(nav==='team'){
    content=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">${users.map((u,ui)=>{
      const ut=tasks.filter(t=>t.userId===u.id);
      const done=ut.filter(t=>t.done).length;
      const ur=activeReports.filter(r=>(r.assignees||[]).find(a=>a.id===u.id));
      const open=ur.filter(r=>r.status!=='resolved').length;
      const pct=ut.length?Math.round(done/ut.length*100):0;
      const col=userColor(u,ui);
      return`<div class="ucard">${avHtml(u,44,ui)}<div style="margin-top:10px;margin-bottom:12px"><div style="font-family:var(--fh);font-weight:700;font-size:14px">${escHtml(u.name)}${u.role==='admin'?` <span class="admin-badge">admin</span>`:''}</div><div style="font-size:10px;color:var(--text3)">${escHtml(u.email)}</div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px">${[['Assigned',ur.length],['Open',open],['Tasks',ut.length]].map(([l,v])=>`<div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center"><div style="font-family:var(--fh);font-size:24px;font-weight:800">${v}</div><div style="font-size:10px;color:var(--text3);font-family:var(--fm);text-transform:uppercase;letter-spacing:1px">${l}</div></div>`).join('')}</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:9px;color:var(--text3);font-family:var(--fm)">${done}/${ut.length}</span><div class="pbar"><div class="pbfill" style="width:${pct}%;background:${col}"></div></div></div></div>`;
    }).join('')}</div>`;
  }
  else if(nav==='admin'){content=adminPageHtml();}
  else if(nav==='leaderboard'){content=leaderboardHtml();}

  root.innerHTML=`
    <div class="app">
      <div class="sidebar">
        <div class="logo"><div class="logo-t">DevTrack</div><div class="logo-s">Engineering Ops</div></div>
        <div class="snav"><div class="slabel">Dashboard</div>${navHtml}</div>
        <div class="snav"><div class="slabel">Team</div>${engHtml}</div>
        <div style="margin-top:auto;padding:10px">
          <div class="ni" style="color:var(--text3);font-size:11px">⬡ Discord sync · live</div>
          <div class="ni" onclick="logout()" style="color:var(--text3)">⇤ Sign out</div>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <div><div class="tbtitle">${titles[nav]||'Dashboard'}</div><div class="tbsub">live data · ${activeReports.length} active reports</div></div>
          <div style="flex:1"></div>
          ${nav!=='admin'&&nav!=='queue'?`<input class="srch" placeholder="Search reports..." value="${escHtml(search)}" oninput="debounceSearch(this.value)">`:''}
          <div class="uprof" onclick="setNav('admin')">
            ${avHtml(CURRENT_USER,26,curIdx>=0?curIdx:0)}
            <span style="font-size:14px;font-weight:500">${escHtml(CURRENT_USER.name.split(' ')[0])}</span>
            ${CURRENT_USER.role==='admin'?'<span class="admin-badge">admin</span>':''}
          </div>
        </div>
        <div class="content">${content}</div>
      </div>
    </div>
    ${modal?modalHtml(modal):''}
    ${state.deleteModal?deleteModalHtml():''}
    <div id="toast" class="toast ok" style="display:none"></div>`;
}

// ── Handlers ──────────────────────────────────────────────────────────────────
let searchTimer;
window.debounceSearch=v=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>setSearch(v),200);};
window.setNav=k=>{state.nav=k;state.editingUser=null;render();};
window.setFilter=f=>{state.filter=f;render();};
window.setSearch=v=>{state.search=v;render();};
window.openModal=openModal;window.loadAll=loadAll;window.logout=logout;
window.doToggleTask=async(id,done)=>{
  try{const u=await toggleTask(id,done);state.tasks=state.tasks.map(t=>t.id===id?{...t,done:u.done}:t);render();}
  catch(e){showToast('Could not update task','err');}
};
window.doAddTask=async(userId)=>{
  const val=(state.newTaskInputs[userId]||'').trim();if(!val)return;
  try{const t=await createTask(val,userId);state.tasks=[...state.tasks,t];state.newTaskInputs[userId]='';render();showToast('Task added');}
  catch(e){showToast('Could not add task','err');}
};

// ── Login ─────────────────────────────────────────────────────────────────────
function renderLogin(){
  document.getElementById('root').innerHTML=`
    <div class="login-page"><div class="login-bg"></div><div class="login-grid"></div>
      <div class="login-card">
        <div class="login-logo">DevTrack</div>
        <div class="login-sub">Engineering Operations</div>
        <div class="login-error" id="login-err"></div>
        <label class="login-label">Email</label>
        <input class="login-input" id="l-email" type="email" placeholder="alex@devtrack.com" autocomplete="email">
        <label class="login-label">Password</label>
        <input class="login-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="login-btn" id="l-btn" onclick="doLogin()">Sign In →</button>
      </div>
    </div>`;
  document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
window.doLogin=async()=>{
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('l-btn');
  const errEl=document.getElementById('login-err');
  if(!email||!pass){errEl.textContent='Please enter email and password.';errEl.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Signing in...';errEl.classList.remove('show');
  try{await login(email,pass);await loadAll();}
  catch(e){errEl.textContent=e.message||'Login failed.';errEl.classList.add('show');btn.disabled=false;btn.textContent='Sign In →';}
};

if(TOKEN&&CURRENT_USER){loadAll();}else{renderLogin();}
</script>
</body>
</html>
